{% extends 'billing/layouts/base.html' %}
{% block content %}

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-xl-8">
            
            <div class="d-flex align-items-center mb-5">
                <div class="bg-primary rounded-4 p-3 shadow-primary-grow me-4">
                    <i class="bi bi-person-plus-fill text-white fs-2"></i>
                </div>
                <div>
                    <h2 class="fw-bold mb-0">Create New Client</h2>
                    <p class="text-muted mb-0 small">Enter client details to initialize a new project workflow.</p>
                </div>
            </div>

            <form method="post">
                {% csrf_token %}

                <div class="card border-0 shadow-sm rounded-4 mb-4">
                    <div class="card-body p-4 p-md-5">
                        <div class="d-flex align-items-center mb-4">
                            <span class="badge rounded-pill bg-primary-subtle text-primary me-2">1</span>
                            <h5 class="fw-bold mb-0">Personal Details</h5>
                        </div>

                        <div class="form-floating mb-4">
                            <input type="text" name="name" class="form-control border-0 bg-light rounded-3" id="nameInput" placeholder="Name" required>
                            <label for="nameInput" class="text-muted">Full Client Name</label>
                        </div>

                        <div class="row g-4">
                            <div class="col-md-6">
                                <div class="form-floating">
                                    <input type="text" name="phone1" class="form-control border-0 bg-light rounded-3" id="phone1" placeholder="Phone" required>
                                    <label for="phone1" class="text-muted">Primary Contact</label>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-floating">
                                    <input type="text" name="phone2" class="form-control border-0 bg-light rounded-3" id="phone2" placeholder="Secondary Phone">
                                    <label for="phone2" class="text-muted">Secondary Contact</label>
                                </div>
                            </div>
                            <div class="col-md-12">
                                <div class="form-floating">
                                    <input type="email" name="email" class="form-control border-0 bg-light rounded-3" id="email" placeholder="Email">
                                    <label for="email" class="text-muted">Email Address</label>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card border-0 shadow-sm rounded-4 mb-4">
                    <div class="card-body p-4 p-md-5">
                        <div class="d-flex align-items-center mb-4">
                            <span class="badge rounded-pill bg-primary-subtle text-primary me-2">2</span>
                            <h5 class="fw-bold mb-0">Project Metadata</h5>
                        </div>

                        <div class="form-floating mb-4">
                            <input type="text" name="location" class="form-control border-0 bg-light rounded-3" id="locInput" placeholder="Location" required>
                            <label for="locInput" class="text-muted">Site Location / Address</label>
                        </div>

                        <div class="row g-4">
                            <div class="col-md-6">
                                <div class="form-floating">
                                    <input type="text" name="GST" class="form-control border-0 bg-light rounded-3" id="gstInput" placeholder="GST">
                                    <label for="gstInput" class="text-muted">GST Number</label>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-floating">
                                    <input type="number" name="discount" class="form-control border-0 bg-light rounded-3" id="discInput" placeholder="0">
                                    <label for="discInput" class="text-muted">Default Discount (%)</label>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card border-0 shadow-sm rounded-4 mb-5">
                    <div class="card-body p-4 p-md-5">
                        <div class="d-flex align-items-center mb-4">
                            <span class="badge rounded-pill bg-primary-subtle text-primary me-2">3</span>
                            <h5 class="fw-bold mb-0">Additional Context</h5>
                        </div>
                        <div class="form-floating">
                            <textarea name="notes" class="form-control border-0 bg-light rounded-3" placeholder="Notes" id="notesArea" style="height: 120px"></textarea>
                            <label for="notesArea" class="text-muted">Client Preferences or Notes...</label>
                        </div>
                    </div>
                </div>

                <div class="d-flex gap-3">
                    <button type="submit" class="btn btn-primary px-5 py-3 rounded-4 fw-bold shadow flex-grow-1">
                        Complete Registration <i class="bi bi-check-circle ms-2"></i>
                    </button>
                    <a href="{% url 'qtn_client_index' %}" class="btn btn-light px-4 py-3 rounded-4 fw-bold text-muted border">
                        Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>

<style>
    /* Custom primary glow effect */
    .shadow-primary-grow {
        box-shadow: 0 10px 20px -5px rgba(13, 110, 253, 0.4);
    }

    /* Floating labels styling override */
    .form-floating > .form-control {
        padding-top: 1.625rem;
        padding-bottom: 0.625rem;
    }
    
    .form-control:focus {
        background-color: #ffffff !important;
        box-shadow: 0 0 0 4px rgba(13, 110, 253, 0.1) !important;
        border: 1px solid #0d6efd !important;
    }

    .bg-primary-subtle {
        background-color: #e7f0ff !important;
    }

    /* Card hover lift */
    .card {
        transition: transform 0.3s ease;
    }
    .card:hover {
        transform: translateY(-5px);
    }
</style>

{% endblock %}
