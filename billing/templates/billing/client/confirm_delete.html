{% extends "layout.html" %}
{% block content %}

<h2>🗑 Delete Client</h2>

<p>
Are you sure you want to delete client:
<strong>{{ client.name }}</strong>?
</p>

<p style="color:red;">
This will remove all related quotations.
</p>

<form method="post">
    {% csrf_token %}
    <button class="btn-danger">Yes, Delete</button>
    <a href="{% url 'quotation_index' %}">Cancel</a>
</form>

{% endblock %}
