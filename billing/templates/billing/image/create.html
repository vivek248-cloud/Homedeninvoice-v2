{% extends "billing/layouts/base.html" %}
{% block content %}

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-sm border-0 rounded-4">
                <div class="card-header bg-white border-bottom-0 pt-4 pb-0 text-center">
                    <div class="display-6 text-primary mb-2">
                        <i class="bi bi-cloud-arrow-up"></i>
                    </div>
                    <h2 class="h4 fw-bold">Upload Image</h2>
                    <p class="text-muted small">Add a new asset to your quotation library</p>
                </div>

                <div class="card-body p-4">
                    <form method="post" enctype="multipart/form-data">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label class="form-label fw-semibold small text-secondary">IMAGE NAME</label>
                            <input type="text" name="name" 
                                   class="form-control form-control-lg bg-light border-0 shadow-none fs-6" 
                                   placeholder="e.g. Living Room Section A" 
                                   required>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold small text-secondary">SELECT FILE</label>
                            <input type="file" name="image" id="imageInput"
                                   class="form-control bg-light border-0 shadow-none" 
                                   accept="image/*"
                                   required>
                            <div class="form-text mt-2 small">Accepted formats: JPG, PNG, WebP</div>
                        </div>

                        <div id="previewContainer" class="mb-4 d-none">
                            <label class="form-label fw-semibold small text-secondary">PREVIEW</label>
                            <div class="rounded-3 border p-2 bg-light text-center">
                                <img id="imagePreview" src="#" alt="Preview" class="img-fluid rounded-2" style="max-height: 200px;">
                            </div>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary btn-lg rounded-pill shadow-sm fw-bold">
                                <i class="bi bi-upload me-2"></i>Upload Image
                            </button>
                            <a href="{% url 'image_index' %}" class="btn btn-primary text-white text-decoration-none small rounded-pill shadow-sm me-1 px-4 py-2">
                                Cancel and Go Back
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    document.getElementById('imageInput').onchange = function (evt) {
        const [file] = this.files;
        if (file) {
            const previewContainer = document.getElementById('previewContainer');
            const previewImage = document.getElementById('imagePreview');
            
            previewImage.src = URL.createObjectURL(file);
            previewContainer.classList.remove('d-none');
        }
    }
</script>

<style>
    /* Focus effects for the inputs */
    .form-control:focus {
        background-color: #fff !important;
        border: 1px solid #0d6efd !important;
    }
</style>

{% endblock %}
