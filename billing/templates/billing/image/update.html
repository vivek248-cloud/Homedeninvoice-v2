{% extends "billing/layouts/base.html" %}
{% block content %}

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <nav aria-label="breadcrumb" class="mb-3">
                <ol class="breadcrumb small fw-bold">
                    <li class="breadcrumb-item"><a href="{% url 'image_index' %}" class="text-decoration-none">Library</a></li>
                    <li class="breadcrumb-item active text-muted">Edit Asset</li>
                </ol>
            </nav>

            <div class="card shadow-sm border-0 rounded-4">
                <div class="card-header bg-white border-bottom-0 pt-4 text-center">
                    <div class="display-6 text-success mb-2">
                        <i class="bi bi-pencil-square"></i>
                    </div>
                    <h2 class="h4 fw-bold">Edit Image Details</h2>
                </div>

                <div class="card-body p-4">
                    <form method="post" enctype="multipart/form-data">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label class="form-label fw-semibold small text-secondary">IMAGE NAME</label>
                            <input type="text" name="name" value="{{ image.name }}" 
                                   class="form-control form-control-lg bg-light border-0 shadow-none fs-6" 
                                   required>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold small text-secondary">CURRENT IMAGE</label>
                            <div class="rounded-3 border p-2 bg-light text-center position-relative overflow-hidden">
                                <img id="imagePreview" src="{{ image.image.url }}" 
                                     alt="Current Image" 
                                     class="img-fluid rounded-2 shadow-sm" 
                                     style="max-height: 200px; object-fit: contain;">
                                <div id="newBadge" class="position-absolute top-0 start-0 m-2 badge bg-warning d-none">New Selection</div>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold small text-secondary">REPLACE IMAGE (OPTIONAL)</label>
                            <input type="file" name="image" id="imageInput"
                                   class="form-control bg-light border-0 shadow-none" 
                                   accept="image/*">
                            <div class="form-text mt-2 small text-muted">Leave blank to keep the current image.</div>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-success btn-lg rounded-pill shadow-sm fw-bold">
                                <i class="bi bi-check-lg me-2"></i>Save Changes
                            </button>
                            <a href="{% url 'image_index' %}" class="btn btn-secondary text-white text-decoration-none small rounded-pill shadow-sm me-1 px-4 py-2">
                                Discard and Go Back
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Live update the preview when a new file is selected
    document.getElementById('imageInput').onchange = function (evt) {
        const [file] = this.files;
        if (file) {
            const previewImage = document.getElementById('imagePreview');
            const newBadge = document.getElementById('newBadge');
            
            previewImage.src = URL.createObjectURL(file);
            newBadge.classList.remove('d-none'); // Show "New Selection" badge
        }
    }
</script>

<style>
    .form-control:focus {
        background-color: #fff !important;
        border: 1px solid #198754 !important; /* Success green border */
    }
    .breadcrumb-item a { color: #6c757d; }
    .breadcrumb-item a:hover { color: #198754; }
</style>

{% endblock %}
