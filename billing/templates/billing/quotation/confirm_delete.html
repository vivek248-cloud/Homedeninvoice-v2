{% extends "billing/layouts/base.html" %}
{% block content %}

<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow-lg border-0 rounded-4 overflow-hidden">
            <!-- Warning Header -->
            <div class="card-header bg-danger bg-opacity-10 border-0 py-4 text-center">
                <div class="display-4 text-danger mb-2">
                    <i class="bi bi-exclamation-triangle-fill"></i>
                </div>
                <h3 class="fw-bold text-danger mb-0">Confirm Deletion</h3>
            </div>

            <div class="card-body p-4 text-center">
                <p class="text-muted mb-4">
                    You are about to delete the quotation for:
                    <br>
                    <span class="h5 fw-bold text-dark d-block mt-2">{{ quotation.client.name }}</span>
                </p>

                <div class="alert alert-warning border-0 small d-flex align-items-center justify-content-center rounded-3">
                    <i class="bi bi-info-circle-fill me-2"></i>
                    This action is permanent and cannot be undone.
                </div>

                <form method="post" class="mt-4">
                    {% csrf_token %}
                    <div class="d-grid gap-2">
                        <button class="btn btn-danger btn-lg rounded-pill fw-bold shadow-sm transition-btn">
                            <i class="bi bi-trash3 me-2"></i>Permanently Delete
                        </button>
                        <a href="{% url 'quotation_index' %}" class="btn btn-link text-muted text-decoration-none fw-bold mt-2">
                            No, Keep Quotation
                        </a>
                    </div>
                </form>
            </div>
            
            <div class="card-footer bg-light border-0 py-3 text-center">
                <small class="text-muted text-uppercase tracking-wider fw-bold" style="font-size: 0.7rem;">
                    Quotation ID: #{{ quotation.id|default:"N/A" }}
                </small>
            </div>
        </div>
    </div>
</div>

<style>
    body {
        background-color: #f8fafc;
    }

    .tracking-wider {
        letter-spacing: 0.08em;
    }

    .transition-btn {
        transition: all 0.3s ease;
    }

    .transition-btn:hover {
        transform: scale(1.02);
        filter: brightness(1.1);
        box-shadow: 0 8px 15px rgba(220, 53, 69, 0.3) !important;
    }

    /* Subtle shake animation on page load to draw attention to the danger */
    .card {
        animation: subtleShake 0.5s ease-in-out;
    }

    @keyframes subtleShake {
        0%, 100% { transform: translateX(0); }
        25% { transform: translateX(-4px); }
        75% { transform: translateX(4px); }
    }
</style>

{% endblock %}
